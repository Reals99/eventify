name: Eventify CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & test server ────────────────────────────────────────────────────
  server:
    name: Server checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Check for syntax errors
        run: node --check index.js routes/*.js models/*.js services/*.js services/social/*.js

      - name: Verify all route files load
        run: |
          node -e "
            process.env.NODE_ENV = 'test';
            // Just require — don't start server
            require('./models/Admin');
            require('./models/Event');
            require('./models/Video');
            require('./models/AppSettings');
            console.log('✅ All models load OK');
          "

  # ── Build client ──────────────────────────────────────────────────────────
  client:
    name: Client build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://placeholder-for-ci.onrender.com

      - name: Verify build output
        run: test -f dist/index.html && echo "✅ Build output OK"

  # ── Deploy (main branch only) ─────────────────────────────────────────────
  deploy:
    name: Deploy to production
    needs: [server, client]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy
        if: vars.RENDER_DEPLOY_HOOK != ''
        run: |
          curl -s "${{ vars.RENDER_DEPLOY_HOOK }}" \
            -X POST \
            -d '{}' \
            -H "Content-Type: application/json" \
            -o /dev/null \
            -w "HTTP %{http_code}\n"

      - name: Trigger Vercel deploy
        if: vars.VERCEL_DEPLOY_HOOK != ''
        run: |
          curl -s "${{ vars.VERCEL_DEPLOY_HOOK }}" \
            -X POST \
            -d '{}' \
            -H "Content-Type: application/json" \
            -o /dev/null \
            -w "HTTP %{http_code}\n"
